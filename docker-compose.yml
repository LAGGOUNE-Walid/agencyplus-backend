services:
  nginx:
    image: nginx:latest
    container_name: logispro-nginx
    ports:
      - "8086:8086"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - logispro-net
  app:
    build: .
    container_name: logispro-app
    ports:
      - "8085:8085"
    command: /bin/logispro
    networks:
      - logispro-net
    depends_on:
      - rabbitmq
      - redis
      - ollama
    volumes:
      - ./src:/app
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=3
    networks:
      - logispro-net
  redis:
    image: redis:latest
    command: redis-server --requirepass root
    environment:
      - REDIS_PASSWORD=root
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    networks:
      - logispro-net
  building-embedding:
     build: .
     volumes:
      - ./src:/app
     command: /bin/building_embedding_generation
     depends_on:
       - rabbitmq
     networks:
       - logispro-net
  contact-embedding:
     build: .
     command: /bin/contact_embedding_generation
     volumes:
       - ./src:/app
     depends_on:
       - rabbitmq
     networks:
       - logispro-net
  
      
  #   depends_on:
  #     - rabbitmq
  #   networks:
  #     - logispro-net
  #   command: ./bin/logispro
  rabbitmq:
    image: rabbitmq:4-management
    container_name: logispro-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: toor
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - logispro-net

networks:
  logispro-net:
    driver: bridge
