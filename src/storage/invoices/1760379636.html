<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Example Pdf</title>
    <style>
        h3 {
            text-align: center;
        }

        table {
            font-family: arial, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

        td, th {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }

        tr:nth-child(even) {
            background-color: #dddddd;
        }
    </style>
</head>

<body>
    <h3>Monthly Payment Report</h3>
    <h3>PulseTracker Agency</h3>
    <p>Summary of users who made payments in October</p>
    <p>Payment ID: PAY-2025-10-001</p>

    <table>
        <thead>
            <tr>
                <th>User Fullname</th>
                <th>User Email</th>
            </tr>
        </thead>
        <tbody>
            
            <tr>
                <td>Alice Dupont</td>
                <td>alice@example.com</td>
            </tr>
            
            <tr>
                <td>Karim Benali</td>
                <td>karim@example.com</td>
            </tr>
            
        </tbody>
    </table>

    <p>Amount: 125000 DZD</p>
</body>

</html>
