<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Example Pdf</title>
    <style>
        h3 {
            text-align: center;
        }

        table {
            font-family: arial, sans-serif;
            border-collapse: collapse;
            width: 100%;
        }

        td, th {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }

        tr:nth-child(even) {
            background-color: #dddddd;
        }
    </style>
</head>

<body>
    <h3>{{ .Title }}</h3>
    <h3>{{ .AgencyName }}</h3>
    <p>{{ .Description }}</p>
    <p>Payment ID: {{ .PaymentID }}</p>

    <table>
        <thead>
            <tr>
                <th>User Fullname</th>
                <th>User Email</th>
            </tr>
        </thead>
        <tbody>
            {{ range $i, $user := .Usernames }}
            <tr>
                <td>{{ $user.Fullname }}</td>
                <td>{{ $user.Email }}</td>
            </tr>
            {{ end }}
        </tbody>
    </table>

    <p>Amount: {{ .Amount }} DZD</p>
</body>

</html>
